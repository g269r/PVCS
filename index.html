<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PVCS – Document Management System</title>
  <meta name="description" content="Patna Sadar Block Primary Vegetables Growers Cooperative Society Limited – Correspondence & Document Management System" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a3a5c" />
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
  <!-- CDN Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.2.3/docx.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="society-logo">
          <div class="logo-circle">🌿</div>
        </div>
        <div class="society-name">
          <div class="name-hindi">पटना सदर प्रखंड</div>
          <div class="name-hindi">प्राथमिक सब्जी उत्पादक</div>
          <div class="name-hindi">सहकारी समिति लिमिटेड</div>
          <div class="name-eng">PVCS</div>
        </div>
      </div>
      <ul class="nav-menu">
        <li><a href="#" class="nav-link active" data-page="dashboard">
          <span class="nav-icon">📊</span><span>Dashboard</span>
        </a></li>
        <li><a href="#" class="nav-link" data-page="create-letter">
          <span class="nav-icon">✍️</span><span>Create Letter</span>
        </a></li>
        <li><a href="#" class="nav-link" data-page="archive">
          <span class="nav-icon">🗂️</span><span>Letter Archive</span>
        </a></li>
        <li><a href="#" class="nav-link" data-page="templates">
          <span class="nav-icon">📋</span><span>Templates</span>
        </a></li>
        <li><a href="#" class="nav-link" data-page="bylaws">
          <span class="nav-icon">📖</span><span>Bylaw Search</span>
        </a></li>
        <li><a href="#" class="nav-link" data-page="backup">
          <span class="nav-icon">💾</span><span>Backup / Restore</span>
        </a></li>
        <li><a href="#" class="nav-link" data-page="settings">
          <span class="nav-icon">⚙️</span><span>Settings</span>
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <div class="reg-number">Reg: 26/HQR/2018</div>
      </div>
    </nav>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Sidebar">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <span class="offline-badge" id="online-status">● Offline</span>
        </div>
      </header>

      <!-- Pages -->
      <div id="page-dashboard" class="page active"></div>
      <div id="page-create-letter" class="page"></div>
      <div id="page-archive" class="page"></div>
      <div id="page-templates" class="page"></div>
      <div id="page-bylaws" class="page"></div>
      <div id="page-backup" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>
  </div>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <button id="modal-close" class="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/recipients.js"></script>
  <script src="js/refnum.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/pdf-export.js"></script>
  <script src="js/docx-export.js"></script>
  <script src="js/bylaws.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/create-letter.js"></script>
  <script src="js/pages/archive.js"></script>
  <script src="js/pages/templates-page.js"></script>
  <script src="js/pages/bylaws-page.js"></script>
  <script src="js/pages/backup.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sw-register.js"></script>
</body>
</html>
