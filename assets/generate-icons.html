<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click → Save As on each canvas to download icons:</p>
<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Background
  ctx.fillStyle = '#1a3a5c';
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();
  
  // Circle
  ctx.fillStyle = '#c8a84b';
  ctx.beginPath();
  ctx.arc(size/2, size * 0.42, size * 0.28, 0, Math.PI * 2);
  ctx.fill();
  
  // Leaf
  ctx.font = `bold ${size * 0.32}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌿', size/2, size * 0.42);
  
  // Text
  ctx.fillStyle = '#c8a84b';
  ctx.font = `bold ${size * 0.14}px Arial`;
  ctx.fillText('PVCS', size/2, size * 0.82);
  
  const img = document.createElement('img');
  img.src = canvas.toDataURL();
  img.title = `icon-${size}.png (right-click → Save Image As)`;
  img.style.margin = '10px';
  img.style.border = '1px solid #ccc';
  document.body.appendChild(img);
  
  const link = document.createElement('a');
  link.href = canvas.toDataURL();
  link.download = `icon-${size}.png`;
  link.textContent = `Download icon-${size}.png`;
  link.style.display = 'block';
  link.style.margin = '5px';
  document.body.appendChild(link);
}

makeIcon(192);
makeIcon(512);
</script>
</body>
</html>
